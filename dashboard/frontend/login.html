<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>ImpactSense — Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="icon" type="image/png" href="earthquake.png"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }

    /* Animated BG */
    .auth-bg {
      position:fixed; inset:0; z-index:0;
      background: radial-gradient(ellipse at 20% 50%, rgba(0,255,200,.06) 0%, transparent 55%),
                  radial-gradient(ellipse at 80% 20%, rgba(0,200,255,.05) 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, rgba(168,85,247,.05) 0%, transparent 50%),
                  var(--void);
    }
    .auth-grid {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        linear-gradient(to right, rgba(0,255,200,.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,255,200,.03) 1px, transparent 1px);
      background-size:50px 50px;
    }
    /* Floating orbs */
    .orb {
      position:fixed; border-radius:50%; pointer-events:none; z-index:0;
      filter:blur(80px); opacity:.3; animation:orb-drift 12s ease-in-out infinite;
    }
    .orb1 { width:400px;height:400px;left:-100px;top:-100px;background:radial-gradient(circle,var(--neon),transparent 60%); animation-delay:0s; }
    .orb2 { width:350px;height:350px;right:-80px;bottom:100px;background:radial-gradient(circle,var(--neon2),transparent 60%); animation-delay:-4s; }
    .orb3 { width:300px;height:300px;left:50%;top:60%;background:radial-gradient(circle,var(--neon3),transparent 60%); animation-delay:-8s; }
    @keyframes orb-drift { 0%,100%{transform:translate(0,0)} 33%{transform:translate(20px,-30px)} 66%{transform:translate(-15px,20px)} }

    /* Auth card */
    .auth-card {
      position:relative; z-index:10;
      width:min(460px,calc(100vw - 2rem));
      background:rgba(3,8,16,.92);
      border:1px solid rgba(0,255,200,.15);
      border-radius:18px;
      padding:2.5rem 2.2rem;
      backdrop-filter:blur(24px);
      box-shadow:0 0 60px rgba(0,255,200,.08), 0 32px 80px rgba(0,0,0,.7);
    }
    .corner-frame .cf { border-color:var(--neon); opacity:.6; }

    .auth-logo {
      display:flex; align-items:center; gap:.7rem;
      margin-bottom:2rem; justify-content:center;
    }
    .auth-logo-icon {
      width:40px;height:40px; border:1.5px solid var(--neon);
      border-radius:10px; display:flex;align-items:center;justify-content:center;
      color:var(--neon); font-size:1.2rem; box-shadow:var(--glow-neon);
    }
    .auth-logo-text { font-family:var(--fd); font-size:1.3rem; font-weight:800; letter-spacing:.12em; }
    .auth-logo-text span { color:var(--neon); }

    .auth-tabs {
      display:grid; grid-template-columns:1fr 1fr;
      background:rgba(255,255,255,.03); border:1px solid var(--border2);
      border-radius:8px; padding:.25rem; margin-bottom:2rem; gap:.25rem;
    }
    .tab-btn {
      font-family:var(--fd); font-size:.82rem; font-weight:600; letter-spacing:.08em;
      padding:.55rem; border:none; border-radius:6px; cursor:pointer;
      background:transparent; color:var(--muted); transition:all .2s;
    }
    .tab-btn.active {
      background:rgba(0,255,200,.1); color:var(--neon);
      box-shadow:0 0 12px rgba(0,255,200,.15);
    }

    .auth-form { display:flex; flex-direction:column; gap:1.1rem; }
    .form-group { display:flex; flex-direction:column; gap:.3rem; }

    .auth-divider {
      display:flex; align-items:center; gap:.8rem;
      font-family:var(--fm); font-size:.65rem; color:var(--muted2); margin:.3rem 0;
    }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border2); }

    .social-btns { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
    .social-btn {
      display:flex; align-items:center; justify-content:center; gap:.5rem;
      font-family:var(--fd); font-size:.78rem; font-weight:600; letter-spacing:.06em;
      padding:.6rem; border-radius:7px; border:1px solid var(--border2);
      background:rgba(255,255,255,.03); color:var(--muted); cursor:pointer; transition:all .2s;
    }
    .social-btn:hover { border-color:var(--neon); color:var(--text); background:rgba(0,255,200,.05); }

    .submit-btn {
      width:100%; padding:.75rem;
      font-family:var(--fd); font-weight:700; font-size:.88rem; letter-spacing:.12em;
      border:1px solid var(--neon); border-radius:7px;
      background:linear-gradient(135deg,rgba(0,255,200,.15),rgba(0,200,255,.1));
      color:var(--neon); cursor:pointer; transition:all .2s;
      position:relative; overflow:hidden;
    }
    .submit-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(0,255,200,.2),transparent);
      opacity:0; transition:opacity .2s;
    }
    .submit-btn:hover { box-shadow:var(--glow-neon); transform:translateY(-1px); }
    .submit-btn:hover::after { opacity:1; }

    .auth-footer-text {
      text-align:center; margin-top:1rem;
      font-family:var(--fm); font-size:.72rem; color:var(--muted);
    }
    .auth-footer-text a { color:var(--neon); cursor:pointer; }
    .auth-footer-text a:hover { text-shadow:0 0 8px rgba(0,255,200,.5); }

    .forgot-link {
      font-family:var(--fm); font-size:.68rem; color:var(--muted);
      cursor:pointer; align-self:flex-end; margin-top:-.5rem;
      transition:color .2s;
    }
    .forgot-link:hover { color:var(--neon); }

    /* Field icons inside inputs */
    .fi { padding-left:2.2rem !important; }

    /* Error/success states */
    .field-error { font-family:var(--fm); font-size:.65rem; color:var(--red); margin-top:.2rem; display:none; }
    .input-error { border-color:var(--red) !important; box-shadow:0 0 0 2px rgba(255,59,92,.12) !important; }
    .success-msg {
      display:none; text-align:center; padding:.8rem;
      background:rgba(0,232,122,.08); border:1px solid rgba(0,232,122,.25);
      border-radius:7px; font-family:var(--fm); font-size:.8rem; color:var(--green);
    }

    /* Password strength */
    .pw-strength { display:flex; gap:.25rem; margin-top:.4rem; }
    .pw-bar { flex:1; height:3px; border-radius:999px; background:var(--border2); transition:background .3s; }

    /* Back to home */
    .back-home {
      position:fixed; top:1.2rem; left:1.5rem; z-index:20;
      display:flex; align-items:center; gap:.4rem;
      font-family:var(--fm); font-size:.7rem; color:var(--muted); letter-spacing:.06em;
      transition:color .2s; cursor:pointer;
    }
    .back-home:hover { color:var(--neon); }
  </style>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <a href="index.html" class="back-home">← BACK TO DASHBOARD</a>

  <div class="auth-card">
    <div class="corner-frame">
      <span class="cf tl"></span><span class="cf tr"></span>
      <span class="cf bl"></span><span class="cf br"></span>
    </div>

    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div class="auth-logo-text">IMPACT<span>SENSE</span></div>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">LOGIN</button>
      <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">SIGN UP</button>
    </div>

    <!-- LOGIN FORM -->
    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <div class="input-wrap">
          <span class="input-icon">@</span>
          <input type="email" id="loginEmail" class="fi" placeholder="analyst@impactsense.io" required/>
        </div>
        <span class="field-error" id="loginEmailErr">Invalid email address</span>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="loginPass" class="fi" placeholder="••••••••" required/>
        </div>
        <span class="forgot-link" onclick="showForgot()">FORGOT PASSWORD?</span>
      </div>
      <button type="submit" class="submit-btn" id="loginBtn">
        <span id="loginBtnText">ACCESS SYSTEM</span>
      </button>
      <div class="auth-divider">OR CONTINUE WITH</div>
      <div class="social-btns">
        <button type="button" class="social-btn" onclick="socialLogin('google')">
          <svg width="14" height="14" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          GOOGLE
        </button>
        <button type="button" class="social-btn" onclick="socialLogin('github')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
          GITHUB
        </button>
      </div>
      <div class="success-msg" id="loginSuccess">✓ ACCESS GRANTED — Redirecting…</div>
    </form>

    <!-- SIGNUP FORM -->
    <form class="auth-form" id="signupForm" style="display:none" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>FULL NAME</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="signupName" class="fi" placeholder="Your full name" required/>
        </div>
      </div>
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <div class="input-wrap">
          <span class="input-icon">@</span>
          <input type="email" id="signupEmail" class="fi" placeholder="analyst@impactsense.io" required/>
        </div>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="signupPass" class="fi" placeholder="Min 8 characters" oninput="checkStrength(this.value)" required/>
        </div>
        <div class="pw-strength">
          <div class="pw-bar" id="pwb1"></div>
          <div class="pw-bar" id="pwb2"></div>
          <div class="pw-bar" id="pwb3"></div>
          <div class="pw-bar" id="pwb4"></div>
        </div>
      </div>
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="signupPass2" class="fi" placeholder="Repeat password" required/>
        </div>
        <span class="field-error" id="pwMatchErr">Passwords do not match</span>
      </div>
      <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
      <div class="auth-divider">OR CONTINUE WITH</div>
      <div class="social-btns">
        <button type="button" class="social-btn" onclick="socialLogin('google')">
          <svg width="14" height="14" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          GOOGLE
        </button>
        <button type="button" class="social-btn" onclick="socialLogin('github')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
          GITHUB
        </button>
      </div>
      <div class="success-msg" id="signupSuccess">✓ ACCOUNT CREATED — Welcome to ImpactSense!</div>
    </form>

    <p class="auth-footer-text" id="switchText">
      Don't have an account? <a onclick="switchTab('signup')">Create one →</a>
    </p>
  </div>

  <script>
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').style.display  = isLogin ? 'flex' : 'none';
      document.getElementById('signupForm').style.display = isLogin ? 'none' : 'flex';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabSignup').classList.toggle('active', !isLogin);
      document.getElementById('switchText').innerHTML = isLogin
        ? `Don't have an account? <a onclick="switchTab('signup')">Create one →</a>`
        : `Already have an account? <a onclick="switchTab('login')">Login →</a>`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const txt = document.getElementById('loginBtnText');
      txt.textContent = 'AUTHENTICATING…';
      btn.disabled = true;
      setTimeout(() => {
        document.getElementById('loginSuccess').style.display = 'block';
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
      }, 1000);
    }

    function handleSignup(e) {
      e.preventDefault();
      const p1 = document.getElementById('signupPass').value;
      const p2 = document.getElementById('signupPass2').value;
      const err = document.getElementById('pwMatchErr');
      if (p1 !== p2) { err.style.display = 'block'; return; }
      err.style.display = 'none';
      document.getElementById('signupSuccess').style.display = 'block';
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    }

    function checkStrength(pw) {
      const bars = [document.getElementById('pwb1'),document.getElementById('pwb2'),document.getElementById('pwb3'),document.getElementById('pwb4')];
      const score = [pw.length>=6, pw.length>=10, /[A-Z]/.test(pw)&&/[0-9]/.test(pw), /[^A-Za-z0-9]/.test(pw)];
      const colors = ['#ff3b5c','#ff7c2a','#f5c518','#00e87a'];
      bars.forEach((b,i) => b.style.background = score.slice(0,i+1).every(Boolean) ? colors[Math.min(score.filter(Boolean).length-1,3)] : 'var(--border2)');
    }

    function socialLogin(provider) {
      const msg = provider === 'google' ? '🔵 Redirecting to Google…' : '⚫ Redirecting to GitHub…';
      document.getElementById('loginForm').querySelector('.submit-btn').textContent = msg;
    }

    function showForgot() {
      const email = document.getElementById('loginEmail').value;
      alert(`Password reset link sent to: ${email || 'your email'}`);
    }
  </script>
</body>
</html>
