<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeismoTerm-88 | Predictor</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #131313;
      --panel: #1c1b1b;
      --panel-hi: #232323;
      --line: #3b4b37;
      --text: #e5e2e1;
      --muted: #9fb39a;
      --accent: #00ff41;
      --accent-soft: #72ff70;
      --danger: #ffb4ab;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      background: var(--bg);
      background-image:
        linear-gradient(rgba(0, 255, 65, .05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 65, .05) 1px, transparent 1px);
      background-size: 42px 42px;
    }

    .scanline-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: .14;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, .22),
        rgba(0, 0, 0, .22) 1px,
        transparent 1px,
        transparent 2px
      );
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 64px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      background: rgba(19, 19, 19, 0.94);
      backdrop-filter: blur(4px);
    }

    .top-inner {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand { color: var(--accent); font-weight:800; letter-spacing:.2em; font-size:.8rem; }
    .nav { display:flex; gap:14px; align-items:center; font-size:12px; flex-wrap: wrap; justify-content: flex-end; }
    .nav a, .nav button { color:#9fb39a; text-decoration:none; background:none; border:none; cursor:pointer; }
    .nav a:hover, .nav button:hover { color: var(--accent-soft); }

    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      min-height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.25fr);
      gap: 18px;
      align-items: center;
      align-content: center;
      position: relative;
      z-index: 2;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel-hi), var(--panel));
      border: 1px solid var(--line);
      padding: 20px;
      box-shadow: 0 0 0 1px rgba(0, 255, 65, 0.08), 0 14px 40px rgba(0, 0, 0, 0.28);
      height: 100%;
    }

    .panel-title {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .field { margin-bottom: 12px; }
    .field label { display:block; font-size:11px; color: var(--muted); margin-bottom:6px; letter-spacing: .08em; }
    .field input {
      width:100%;
      background:#101010;
      border:1px solid var(--line);
      color: var(--accent);
      padding:11px 10px;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 255, 65, .18);
    }

    .row3 { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:10px; }

    .btn {
      width:100%;
      margin-top:10px;
      border:none;
      background: var(--accent);
      color:#081d0d;
      padding:12px;
      font-weight:800;
      letter-spacing:.12em;
      transition: transform .12s ease, filter .15s ease;
    }

    .btn:hover { filter: brightness(1.07); }
    .btn:active { transform: translateY(1px); }

    .muted { color: var(--muted); font-size:12px; letter-spacing: .08em; }
    .target {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border:1px solid #000;
      font-weight:800;
      color:#111;
      box-shadow: 0 6px 20px rgba(0,0,0,.25);
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(240px, .95fr) minmax(240px, 1.05fr);
      gap: 26px;
      margin-top: 10px;
      align-items: start;
    }

    .score { font-size: clamp(42px, 5vw, 58px); color: var(--accent); margin:8px 0; font-weight:800; line-height: .95; }
    .risk { font-size: clamp(26px, 3vw, 36px); color: var(--accent-soft); margin:6px 0; font-weight:800; letter-spacing: .04em; }
    .prob-item { margin:10px 0 14px; }
    .prob-top { display:flex; justify-content:space-between; font-size:12px; margin-bottom: 4px; }
    .bar { height:8px; background:#353534; }
    .fill { height:100%; }
    .digest {
      margin-top:18px;
      border-top:1px solid var(--line);
      padding-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:7px;
    }

    .chip {
      background:#2a2a2a;
      border:1px solid var(--line);
      font-size:10px;
      padding:5px 9px;
      letter-spacing: .06em;
    }

    .hidden { display:none; }
    .err {
      margin-top:10px;
      color: var(--danger);
      font-size:13px;
      border: 1px solid rgba(255, 180, 171, .35);
      background: rgba(147, 0, 10, .15);
      padding: 8px 10px;
    }

    .shake-min { animation:none; }
    .shake-light { animation: quake .35s linear 2; }
    .shake-medium { animation: quake .22s linear 5; }
    .shake-heavy { animation: quake .14s linear 8; }

    @keyframes quake { 0%{transform:translate(0,0)} 25%{transform:translate(1px,-1px)} 50%{transform:translate(-1px,1px)} 75%{transform:translate(1px,1px)} 100%{transform:translate(0,0)} }

    @media (max-width: 1080px) {
      .result-grid { grid-template-columns: 1fr; gap: 14px; }
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns:1fr;
        min-height: auto;
        align-items: start;
        align-content: start;
      }
      .row3 { grid-template-columns:1fr; }
      .nav { gap: 10px; }
      .top { padding: 8px 14px; }
      .top-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="scanline-overlay"></div>
  <header class="top">
    <div class="top-inner">
      <div class="brand">SEISMIC_PREDICTOR_INTERFACE</div>
      <div class="nav">
        <span id="userTag"></span>
        <a href="/">DASHBOARD</a>
        <button id="logoutBtn">LOGOUT</button>
      </div>
    </div>
  </header>

  <main class="grid">
    <section class="panel">
      <p class="panel-title">PARAMETER_INPUT_V02</p>
      <form id="predictForm">
        <div class="field"><label>MAGNITUDE</label><input name="magnitude" type="number" step="0.01" min="0" max="10" required></div>
        <div class="field"><label>DEPTH</label><input name="depth" type="number" step="0.01" min="0" max="700" required></div>
        <div class="row3">
          <div class="field"><label>CDI</label><input name="cdi" type="number" step="0.01" min="0" max="12" required></div>
          <div class="field"><label>MMI</label><input name="mmi" type="number" step="0.01" min="0" max="12" required></div>
          <div class="field"><label>SIG</label><input name="sig" type="number" step="0.01" min="0" max="1200" required></div>
        </div>
        <button class="btn" type="submit">RUN_PREDICTION_ENGINE</button>
      </form>
      <p id="errorText" class="err hidden"></p>
    </section>

    <section id="resultBox" class="panel">
      <h3 style="margin-top:0; margin-bottom:8px; letter-spacing:.08em;">PREDICTION_RESULT</h3>
      <div id="resultEmpty" class="muted">NO_PREDICTION_YET. INPUT_PARAMETERS_AND_RUN_ENGINE.</div>

      <div id="resultContent" class="hidden">
        <div class="result-grid">
          <div>
            <p class="muted">TARGET CLASS</p>
            <div id="targetBadge" class="target"><span>!</span><span id="targetText"></span></div>
            <p class="muted" style="margin-top:16px">IMPACT SCORE</p>
            <div id="impactText" class="score"></div>
            <p class="muted">RISK LEVEL</p>
            <div id="riskText" class="risk"></div>
          </div>

          <div>
            <p class="muted" style="margin-top:0">PROBABILITY MAP</p>
            <div id="probList"></div>
          </div>
        </div>
      </div>

      <div id="digestWrap" class="digest hidden"></div>
    </section>
  </main>

  <script>
    const classColors = { green: '#2e8b57', yellow: '#f2c94c', orange: '#f2994a', red: '#d7263d' };
    const shakeClasses = ['shake-min', 'shake-light', 'shake-medium', 'shake-heavy'];

    const user = localStorage.getItem('impact_user');
    if (!user) {
      window.location.href = '/login';
    } else {
      document.getElementById('userTag').textContent = `OPERATOR: ${user.toUpperCase()}`;
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('impact_user');
      window.location.href = '/';
    });

    document.getElementById('predictForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errorText');
      errorEl.classList.add('hidden');
      errorEl.textContent = '';

      const formData = new FormData(e.target);
      const payload = Object.fromEntries(formData.entries());
      Object.keys(payload).forEach((k) => payload[k] = Number(payload[k]));

      try {
        const res = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const contentType = res.headers.get('content-type') || '';
        const isJson = contentType.includes('application/json');
        const data = isJson ? await res.json() : null;

        if (!res.ok) {
          if (data && data.error) throw new Error(data.error);
          const fallback = await res.text();
          throw new Error(`Prediction failed (${res.status}). ${fallback.slice(0, 120)}`);
        }

        if (!data) throw new Error('Prediction failed: API returned non-JSON response.');
        renderResult(data);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    });

    function renderResult(data) {
      const box = document.getElementById('resultBox');
      box.classList.remove(...shakeClasses);
      box.classList.add(data.shake_class || 'shake-min');

      document.getElementById('resultEmpty').classList.add('hidden');
      document.getElementById('resultContent').classList.remove('hidden');

      const target = data.predicted_class.toUpperCase();
      const badge = document.getElementById('targetBadge');
      document.getElementById('targetText').textContent = `${target}_ALERT`;
      badge.style.background = data.target_color;
      badge.style.color = '#111';

      document.getElementById('impactText').textContent = `${data.impact_score} /100.0`;
      document.getElementById('riskText').textContent = `${data.risk_level.toUpperCase()}_EVENT`;

      const probList = document.getElementById('probList');
      probList.innerHTML = '';
      Object.entries(data.probabilities).forEach(([label, value]) => {
        const color = classColors[label] || '#00ff41';
        const row = document.createElement('div');
        row.className = 'prob-item';
        row.innerHTML = `
          <div class="prob-top"><span>${label.toUpperCase()}</span><span style="color:${color}">${value}%</span></div>
          <div class="bar"><div class="fill" style="width:${Math.max(0, Math.min(100, value))}%; background:${color}"></div></div>
        `;
        probList.appendChild(row);
      });

      const digest = document.getElementById('digestWrap');
      digest.classList.remove('hidden');
      digest.innerHTML = '';
      Object.entries(data.features_used).forEach(([k, v]) => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = `${k.toUpperCase()}: ${v}`;
        digest.appendChild(chip);
      });
    }
  </script>
</body>
</html>
