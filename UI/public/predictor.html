<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeismoTerm-88 | Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:'Space Grotesk',sans-serif; background:#131313; color:#e5e2e1; }
    .top { height:64px; border-bottom:1px solid #3b4b37; display:flex; align-items:center; justify-content:space-between; padding:0 20px; }
    .brand { color:#00ff41; font-weight:800; letter-spacing:.2em; font-size:.8rem; }
    .nav { display:flex; gap:12px; align-items:center; font-size:12px; }
    .nav a, .nav button { color:#9fb39a; text-decoration:none; background:none; border:none; cursor:pointer; }
    .grid { max-width:1200px; margin:0 auto; padding:24px; display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
    .panel { background:#1c1b1b; border:1px solid #3b4b37; padding:18px; }
    .field { margin-bottom:10px; }
    .field label { display:block; font-size:12px; color:#9fb39a; margin-bottom:4px; }
    .field input { width:100%; background:#111; border:1px solid #3b4b37; color:#00ff41; padding:10px; }
    .row3 { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; }
    .btn { width:100%; margin-top:8px; border:none; background:#00ff41; color:#081d0d; padding:12px; font-weight:800; letter-spacing:.08em; }
    .muted { color:#9fb39a; font-size:12px; }
    .target { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid #000; font-weight:800; color:#111; }
    .score { font-size:52px; color:#00ff41; margin:8px 0; font-weight:800; }
    .risk { font-size:34px; color:#72ff70; margin:6px 0; font-weight:800; }
    .prob-item { margin:10px 0; }
    .prob-top { display:flex; justify-content:space-between; font-size:12px; }
    .bar { height:8px; background:#353534; margin-top:4px; }
    .fill { height:100%; }
    .digest { margin-top:14px; border-top:1px solid #3b4b37; padding-top:10px; display:flex; flex-wrap:wrap; gap:6px; }
    .chip { background:#2a2a2a; border:1px solid #3b4b37; font-size:10px; padding:4px 8px; }
    .hidden { display:none; }
    .err { margin-top:8px; color:#ffb4ab; font-size:13px; }
    .shake-min { animation:none; }
    .shake-light { animation: quake .35s linear 2; }
    .shake-medium { animation: quake .22s linear 5; }
    .shake-heavy { animation: quake .14s linear 8; }
    @keyframes quake { 0%{transform:translate(0,0)} 25%{transform:translate(1px,-1px)} 50%{transform:translate(-1px,1px)} 75%{transform:translate(1px,1px)} 100%{transform:translate(0,0)} }
    @media (max-width: 900px) { .grid { grid-template-columns:1fr; } .row3 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand">SEISMIC_PREDICTOR_INTERFACE</div>
    <div class="nav">
      <span id="userTag"></span>
      <a href="/">DASHBOARD</a>
      <button id="logoutBtn">LOGOUT</button>
    </div>
  </header>

  <main class="grid">
    <section class="panel">
      <p class="muted">PARAMETER_INPUT_V02</p>
      <form id="predictForm">
        <div class="field"><label>MAGNITUDE</label><input name="magnitude" type="number" step="0.01" min="0" max="10" required></div>
        <div class="field"><label>DEPTH</label><input name="depth" type="number" step="0.01" min="0" max="700" required></div>
        <div class="row3">
          <div class="field"><label>CDI</label><input name="cdi" type="number" step="0.01" min="0" max="12" required></div>
          <div class="field"><label>MMI</label><input name="mmi" type="number" step="0.01" min="0" max="12" required></div>
          <div class="field"><label>SIG</label><input name="sig" type="number" step="0.01" min="0" max="1200" required></div>
        </div>
        <button class="btn" type="submit">RUN_PREDICTION_ENGINE</button>
      </form>
      <p id="errorText" class="err hidden"></p>
    </section>

    <section id="resultBox" class="panel">
      <h3 style="margin-top:0">PREDICTION_RESULT</h3>
      <div id="resultEmpty" class="muted">NO_PREDICTION_YET. INPUT_PARAMETERS_AND_RUN_ENGINE.</div>

      <div id="resultContent" class="hidden">
        <p class="muted">TARGET CLASS</p>
        <div id="targetBadge" class="target"><span>!</span><span id="targetText"></span></div>
        <p class="muted" style="margin-top:16px">IMPACT SCORE</p>
        <div id="impactText" class="score"></div>
        <p class="muted">RISK LEVEL</p>
        <div id="riskText" class="risk"></div>

        <p class="muted" style="margin-top:14px">PROBABILITY MAP</p>
        <div id="probList"></div>
      </div>

      <div id="digestWrap" class="digest hidden"></div>
    </section>
  </main>

  <script>
    const classColors = { green: '#2e8b57', yellow: '#f2c94c', orange: '#f2994a', red: '#d7263d' };
    const shakeClasses = ['shake-min', 'shake-light', 'shake-medium', 'shake-heavy'];

    const user = localStorage.getItem('impact_user');
    if (!user) {
      window.location.href = '/login';
    } else {
      document.getElementById('userTag').textContent = `OPERATOR: ${user.toUpperCase()}`;
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('impact_user');
      window.location.href = '/';
    });

    document.getElementById('predictForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errorText');
      errorEl.classList.add('hidden');
      errorEl.textContent = '';

      const formData = new FormData(e.target);
      const payload = Object.fromEntries(formData.entries());
      Object.keys(payload).forEach((k) => payload[k] = Number(payload[k]));

      try {
        const res = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const contentType = res.headers.get('content-type') || '';
        const isJson = contentType.includes('application/json');
        const data = isJson ? await res.json() : null;

        if (!res.ok) {
          if (data && data.error) throw new Error(data.error);
          const fallback = await res.text();
          throw new Error(`Prediction failed (${res.status}). ${fallback.slice(0, 120)}`);
        }

        if (!data) throw new Error('Prediction failed: API returned non-JSON response.');
        renderResult(data);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    });

    function renderResult(data) {
      const box = document.getElementById('resultBox');
      box.classList.remove(...shakeClasses);
      box.classList.add(data.shake_class || 'shake-min');

      document.getElementById('resultEmpty').classList.add('hidden');
      document.getElementById('resultContent').classList.remove('hidden');

      const target = data.predicted_class.toUpperCase();
      const badge = document.getElementById('targetBadge');
      document.getElementById('targetText').textContent = `${target}_ALERT`;
      badge.style.background = data.target_color;
      badge.style.color = '#111';

      document.getElementById('impactText').textContent = `${data.impact_score} /100.0`;
      document.getElementById('riskText').textContent = `${data.risk_level.toUpperCase()}_EVENT`;

      const probList = document.getElementById('probList');
      probList.innerHTML = '';
      Object.entries(data.probabilities).forEach(([label, value]) => {
        const color = classColors[label] || '#00ff41';
        const row = document.createElement('div');
        row.className = 'prob-item';
        row.innerHTML = `
          <div class="prob-top"><span>${label.toUpperCase()}</span><span style="color:${color}">${value}%</span></div>
          <div class="bar"><div class="fill" style="width:${Math.max(0, Math.min(100, value))}%; background:${color}"></div></div>
        `;
        probList.appendChild(row);
      });

      const digest = document.getElementById('digestWrap');
      digest.classList.remove('hidden');
      digest.innerHTML = '';
      Object.entries(data.features_used).forEach(([k, v]) => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = `${k.toUpperCase()}: ${v}`;
        digest.appendChild(chip);
      });
    }
  </script>
</body>
</html>
