<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SeismoTerm-88 | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          surface: "#131313",
          primary: "#00ff41",
          muted: "#84967e",
          panel: "#1c1b1b",
          borderx: "#3b4b37",
          err: "#ffb4ab"
        },
        fontFamily: { body: ["Space Grotesk"] }
      }
    }
  }
</script>
<style>
  .scanlines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.15;
  }
  .crt-glow { text-shadow: 0 0 8px rgba(0, 255, 65, 0.6); }
</style>
</head>
<body class="bg-surface text-white font-body selection:bg-primary selection:text-black">
<div class="scanlines"></div>

<div class="min-h-screen flex flex-col items-center justify-center p-6 sm:p-20 relative overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(0,255,65,0.03)_0%,transparent_70%)]"></div>

  <header class="w-full max-w-2xl mb-12 flex flex-col gap-2 border-l-2 border-primary pl-6 z-10">
    <div class="text-primary font-black tracking-[0.4em] text-xs opacity-70">SYSTEM_ACCESS_NODE: 0x88_DELTA</div>
    <h1 class="text-3xl sm:text-5xl font-black text-primary crt-glow leading-tight uppercase tracking-tighter">SeismoTerm-88</h1>
    <div class="flex items-center gap-4 text-[#72ff70] text-xs font-bold tracking-widest mt-2">
      <span>STATUS: OPERATIONAL</span>
      <span class="w-2 h-2 bg-primary animate-pulse"></span>
      <span>UPTIME: LIVE</span>
    </div>
  </header>

  <main class="w-full max-w-2xl flex flex-col gap-8 relative z-10">
    <section class="bg-panel p-8 sm:p-10 shadow-[10px_10px_0px_0px_rgba(0,113,23,0.3)] border-t border-l border-borderx/40">
      <div class="mb-8">
        <h2 class="text-primary tracking-widest font-bold uppercase text-sm mb-4">USER_IDENTIFICATION_REQUIRED</h2>
        <div class="h-px w-full bg-borderx/30"></div>
      </div>

      <form method="post" action="{{ url_for('login') }}" class="flex flex-col gap-8">
        <div class="flex flex-col gap-3">
          <label class="text-[#72ff70] text-[10px] font-bold tracking-[0.2em] uppercase" for="display_name">OPERATOR_NAME</label>
          <div class="relative group">
            <span class="absolute left-0 top-1/2 -translate-y-1/2 text-primary font-bold text-lg select-none">&gt;</span>
            <input autocomplete="off" class="w-full bg-transparent border-0 border-b-2 border-borderx/60 focus:border-primary text-primary font-mono text-xl pl-8 py-3 transition-all placeholder:text-muted/40" id="display_name" name="display_name" placeholder="TYPE_NAME_HERE" type="text" maxlength="30" required/>
          </div>
        </div>
        <div>
          <button class="w-full sm:w-auto px-10 py-4 bg-[#007117] text-white font-black uppercase tracking-[0.2em] text-sm hover:bg-primary hover:text-black transition-colors shadow-[4px_4px_0px_0px_#003907]" type="submit">ENTER_APP</button>
        </div>
      </form>

      {% if error %}
      <div class="mt-8 p-5 bg-[#93000a1f] border border-err/20 min-h-[70px] flex items-center">
        <div class="flex items-start gap-3">
          <span class="material-symbols-outlined text-err">warning</span>
          <div class="text-err text-xs font-bold uppercase tracking-wider">{{ error }}</div>
        </div>
      </div>
      {% endif %}

      <div class="mt-8">
        <a class="text-xs uppercase tracking-widest text-muted hover:text-primary transition-colors" href="{{ url_for('landing') }}">RETURN_TO_LANDING</a>
      </div>
    </section>
  </main>
</div>
</body></html>
